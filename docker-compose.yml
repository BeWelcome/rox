x-cache-from:
  - &cache-from
    cache_from:
      - ${APP_IMAGE:-bewelcome/app}

services:
  app:
    build:
      context: .
      target: bewelcome_php_dev
      <<: *cache-from
    image: ${APP_IMAGE:-bewelcome/app}
    environment:
      SERVER_NAME: :80
    healthcheck:
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
      test: ["CMD", "frankenphp", "php-cli", "-r", "echo 1;"]
    depends_on:
      - db
      - manticore
      - mailer
    volumes:
      - .:/srv/bewelcome:rw,cached
      # if you develop on Linux, you may use a bind-mounted host directory instead
      # - ./var:/srv/bewelcome/var:rw
    ports:
      - "8080:80"
      - "8043:443"
      - "8043:443/udp"

  db:
    image: mariadb:12.0.2
    environment:
      MYSQL_ROOT_PASSWORD: bewelcome_root_dev
      MYSQL_DATABASE: bewelcome
      MYSQL_USER: bewelcome
      MYSQL_PASSWORD: bewelcome
    volumes:
      - db-data:/var/lib/mysql:rw

  manticore:
    image: manticoresearch/manticore
    restart: always
    ports:
      - "127.0.0.1:9306:9306"
      - "127.0.0.1:9308:9308"
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data:/var/lib/manticore
#      - ./docker/manticore/manticore.conf:/etc/manticoresearch/manticore.conf

  mailer:
    image: tophfr/mailcatcher

volumes:
  db-data: {}
  manticore-data: {}
