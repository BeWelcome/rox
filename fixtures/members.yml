App\Entity\Member:
    bwadmin:
        Username: 'bwadmin'
        BirthDate: <dateTime('1970-01-01')>
        Email: <email()>
        Status: 'Active'
        RemindersWithoutLogin: 0
        HideAttribute: 0
        Name: 'BeWelcome Admin'
        ShortName: 'BWAdmin'
        Gender: 'other'
        Accommodation: 'neverask'
