App\Entity\MemberLanguageLevel:
    bwadmin_english_mother_tongue:
        Member:  '@bwadmin'
        Language: '@language_en'
        Level: 'MotherLanguage'
    member_french_{1..10}:
        Member:  '@member_<current()>'
        Language: '@language_fr'
        Level: '<randomElement(["MotherLanguage", "Expert", "Intermediate", "Beginner"])>'
    member_english_{1..10}:
        Member:  '@member_<current()>'
        Language: '@language_en'
        Level: '<randomElement(["Expert", "MotherLanguage", "Intermediate", "Beginner"])>'
