album:
    - 'Album: '
    - Shown on the gallery manage page in front of the album title.
upload.error.no_image:
    - 'Unknown file'
    - Error shown to the user, when an error happens during image upload and the server can't return the filename
upload.error.too_large:
    - 'Uploaded file too large'
    - Error shown, when the filename of the uploaded file isn't known as that is the most likeliest reason
gallery.no.albums:
    - This user has not created any albums yet.
    - Shown if there are no albums.
gallery.no.latest.images:
    - This user hasn\'t uploaded any images yet.
    - Shown if there are no images uploaded by the user.
gallery.upload.type.error:
    - The file type is not supported.
    - Shown as a note to the user when they try to upload a file that isn't an image on the gallery upload page.
gallery.upload.size.error:
    - The file is too large to be uploaded to the server.
    - Shown as a note to the user when they try to upload a too large file on the gallery upload page.
gallery.upload.successful:
    - Image uploaded successfully.
    - Shown to the user when a file was successfully transferred to the server.
gallery.select.all:
    - 'Select all'
    - Label for the checkbox on manage gallery page
gallery.move.not.possible:
    - Can't move without target. Neither album selected nor new name provided.
    - Error message shown if someone tries to move images but did not select any of the radiobutton options
gallery.no.album.selected:
    - 'No album selected.'
    - Error message shown if someone tries to move images and did not select an album (but selected the radiobutton to move into album)
gallery.no.album.given:
    - 'No name for album given.'
    - Error message shown if someone tries to move images and did not give an album name (but selected the radiobutton for new album)
gallery.no.images.selected:
    - 'You need to select at least one image.'
    - Error message shown if someone tries to move or delete images but didn't select any
gallery.create.new.album:
    - '@GalleryCreateNewPhotoset'
gallery.use.existing.album:
    - '@GalleryAddToPhotoset'
gallery.manage.empty.title:
    - 'No photos yet'
    - Shown as the title of the empty state on the gallery manage page when the member has not uploaded any photo.
gallery.manage.empty.text:
    - 'Share your travels and memories with the community by uploading your first photos.'
    - Shown as the description in the empty state on the gallery manage page, inviting the member to upload their first photos.
gallery.manage.photo.count.one:
    - '%d photo'
    - Shown next to the page title on the gallery manage page when the member has exactly one photo. The %d placeholder is the photo count.
gallery.manage.photo.count.many:
    - '%d photos'
    - Shown next to the page title on the gallery manage page when the member has more than one photo. The %d placeholder is the photo count.
gallery.upload.dropzone.title:
    - 'Drop your photos here'
    - Title of the drag-and-drop area on the gallery upload page, inviting the member to drag image files.
gallery.upload.dropzone.subtitle:
    - 'or click to browse from your computer'
    - Subtitle below the drag-and-drop area on the gallery upload page, indicating the area can also be clicked to open the file picker.
gallery.upload.queue.title:
    - 'Upload queue'
    - Heading shown above the list of files being uploaded on the gallery upload page.
gallery.upload.back.to.gallery:
    - 'Back to my gallery'
    - Link shown on the gallery upload page that takes the member back to their gallery management page.
gallery.image.edit.page_title:
    - 'Edit photo'
    - Browser tab title suffix on the gallery image edit page (after the image title).
gallery.image.edit.back:
    - 'Back to gallery'
    - Link from the gallery image edit page to the gallery management page (/gallery/manage).
gallery.image.edit.view_full:
    - 'Open full size'
    - Link under the preview on the gallery image edit page to the legacy full image URL.
gallery.image.edit.save:
    - 'Save changes'
    - Primary submit button on the gallery image edit form.
