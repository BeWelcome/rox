languages.spoken:
    - "@spokenlanguages"
languages.signed:
    - "@signedlanguages"
languages.written:
    - '@writtenlanguages'
languages.error.duplicates:
    - 'Duplicate languages!'
    - Error message on the edit languages page
    - validators
languages.error.no.mother.tongue:
    - 'No mother tongue!'
    - Error message on the edit languages page
    - validators
language.delete.no:
    - 'No'
    - Button label to confirm that the profile language shall be kept
language.delete.yes:
    - 'Yes'
    - Button label to confirm that the profile language shall be deleted
language.deleted.flash:
    - Deleted {language} content of the profile.
    - Flash message shown if a profile translation gets deleted. Make sure to keep the { language } tag.
