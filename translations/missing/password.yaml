reset.password.error:
    - '@resetpassworderror'
reset.password.too.fast:
    - 'The last request for a password reset is less than 5 days old. Please check your spam folder.'
    - Error message shown if an user asked for a password reset already and didn't follow through with it.
password.request.headline:
    - 'Forgot your password?'
    - Headline on the request password reset page /resetpassword.
password.request.subtitle:
    - "Enter your username or email and we'll send you a link to set a new password."
    - Subtitle on the request password reset page /resetpassword.
password.request.submit:
    - 'Send reset link'
    - Submit button label on the request password reset page /resetpassword.
password.request.back.login:
    - 'Back to log in'
    - Link back to the login page from /resetpassword.
password.reset.headline:
    - 'Set a new password'
    - Headline on the reset password page after clicking the email link.
password.reset.subtitle:
    - 'Choose a strong new password to secure your account.'
    - Subtitle on the reset password page after clicking the email link.
password.reset.submit:
    - 'Save new password'
    - Submit button label on the reset password page after clicking the email link.
