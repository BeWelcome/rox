    - Finish setup
    - Label on the button to finish account setup (part of the flash shown when account lacks information.
label.shortname:
    - Short name (optional)
    - Label on the finish account page
placeholder.shortname:
    - Name used instead of username if set
    - Placeholder on the finish account page
help.shortname:
    - Setting a short name is optional. If set it will be used instead of your username e.g. in the search results.
    - Help text on the finish account page
profile.set.location:
    - Location
    - Label used on the finish account page
profile.switch.language:
