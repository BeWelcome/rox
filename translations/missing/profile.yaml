    - The registration key was sent to you via email. If you clicked the link in that email it is already filled in. Otherwise just copy and paste it here (your phone might even suggest it from email). If you haven't gotten an email with the key please check your spam folder.
    - Help text for the registration key field used on finalize setup or confirm email pages
error.registration.key:
    - The provided registration key doesn't match the stored information.
label.registration.key.optional:
